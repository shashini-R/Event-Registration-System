<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            Event Registration
        </a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="register.html">Register</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="registrations.html">Registrations</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-primary mb-4">
            Event Registration
        </h2>

        <form id="registrationForm">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                    type="text"
                    class="form-control"
                    id="name"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input
                    type="text"
                    class="form-control"
                    id="phone"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Event</label>

                <select class="form-select" id="event">

                    <option>Hackathon</option>
                    <option>Workshop</option>
                    <option>Seminar</option>
                    <option>Coding Contest</option>

                </select>
            </div>

            <button class="btn btn-primary w-100">
                Register
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>
<footer class="bg-primary text-white text-center p-3 mt-5">

<p class="mb-0">
© 2026 Event Registration System | Developed by Shashini
</p>

</footer>
</body>
</html>
